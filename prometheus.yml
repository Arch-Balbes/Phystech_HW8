global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - prometheus_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: ml_service
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          service: ml_inference
